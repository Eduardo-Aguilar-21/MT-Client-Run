<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <title>NEXUS - Logo Estático Premium</title>
  <desc>Logo oficial de NEXUS - Ingeniería Mecatrónica con máxima calidad vectorial</desc>
  
  <defs>
    <!-- Gradiente núcleo cuántico -->
    <radialGradient id="quantum-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="15%" style="stop-color:#FFF5E1;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#EF9F27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E24B4A;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#993C1D;stop-opacity:0.8" />
      <stop offset="85%" style="stop-color:#378ADD;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0C447C;stop-opacity:0" />
    </radialGradient>
    
    <!-- Gradiente cromático texto -->
    <linearGradient id="text-chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#EF9F27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E24B4A;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#378ADD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C447C;stop-opacity:1" />
    </linearGradient>
    
    <!-- Filtro glow premium -->
    <filter id="premium-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Anillos de influencia Fibonacci -->
  <circle cx="400" cy="320" r="377" fill="none" stroke="#378ADD" stroke-width="1" opacity="0.15"/>
  <circle cx="400" cy="320" r="233" fill="none" stroke="#EF9F27" stroke-width="1.5" opacity="0.2"/>
  <circle cx="400" cy="320" r="144" fill="none" stroke="#E24B4A" stroke-width="2" opacity="0.25"/>
  <circle cx="400" cy="320" r="89" fill="none" stroke="#378ADD" stroke-width="2.5" opacity="0.3"/>
  <circle cx="400" cy="320" r="55" fill="none" stroke="#EF9F27" stroke-width="3" opacity="0.35"/>
  <circle cx="400" cy="320" r="34" fill="none" stroke="#E24B4A" stroke-width="3.5" opacity="0.4"/>
  
  <!-- Hexágonos concéntricos (espiral áurea) -->
  <path d="M 400,50 L 550,150 L 550,490 L 400,590 L 250,490 L 250,150 Z" 
        fill="none" stroke="#378ADD" stroke-width="5" opacity="0.25"/>
  <path d="M 400,90 L 520,175 L 520,465 L 400,550 L 280,465 L 280,175 Z" 
        fill="none" stroke="#0C447C" stroke-width="5" opacity="0.35"/>
  <path d="M 400,130 L 490,200 L 490,440 L 400,510 L 310,440 L 310,200 Z" 
        fill="rgba(55,138,221,0.08)" stroke="#378ADD" stroke-width="6" opacity="0.45"/>
  <path d="M 400,170 L 460,225 L 460,415 L 400,470 L 340,415 L 340,225 Z" 
        fill="rgba(12,68,124,0.12)" stroke="#185FA5" stroke-width="7" opacity="0.6"/>
  <path d="M 400,210 L 430,250 L 430,390 L 400,430 L 370,390 L 370,250 Z" 
        fill="rgba(55,138,221,0.18)" stroke="#378ADD" stroke-width="8" opacity="0.75"/>
  
  <!-- Placas nanotecnológicas (12 piezas) -->
  <g opacity="0.9">
    <path d="M 380,220 L 400,210 L 420,220 L 420,245 L 400,255 L 380,245 Z" fill="#185FA5" stroke="#378ADD" stroke-width="2.5"/>
    <path d="M 445,245 L 475,255 L 470,290 L 440,280 Z" fill="#0C447C" stroke="#378ADD" stroke-width="2.5"/>
    <path d="M 475,295 L 490,310 L 485,345 L 470,330 Z" fill="#185FA5" stroke="#378ADD" stroke-width="2.5"/>
    <path d="M 485,350 L 490,380 L 470,385 L 465,355 Z" fill="#0C447C" stroke="#378ADD" stroke-width="2.5"/>
    <path d="M 475,400 L 490,415 L 470,445 L 455,430 Z" fill="#185FA5" stroke="#378ADD" stroke-width="2.5"/>
    <path d="M 445,450 L 475,460 L 465,490 L 435,480 Z" fill="#0C447C" stroke="#378ADD" stroke-width="2.5"/>
    <path d="M 380,495 L 400,505 L 420,495 L 420,470 L 400,460 L 380,470 Z" fill="#185FA5" stroke="#378ADD" stroke-width="2.5"/>
    <path d="M 355,450 L 325,460 L 335,490 L 365,480 Z" fill="#0C447C" stroke="#378ADD" stroke-width="2.5"/>
    <path d="M 325,400 L 310,415 L 330,445 L 345,430 Z" fill="#185FA5" stroke="#378ADD" stroke-width="2.5"/>
    <path d="M 315,350 L 310,380 L 330,385 L 335,355 Z" fill="#0C447C" stroke="#378ADD" stroke-width="2.5"/>
    <path d="M 325,295 L 310,310 L 315,345 L 330,330 Z" fill="#185FA5" stroke="#378ADD" stroke-width="2.5"/>
    <path d="M 355,245 L 325,255 L 330,290 L 360,280 Z" fill="#0C447C" stroke="#378ADD" stroke-width="2.5"/>
  </g>
  
  <!-- Red neuronal energética (12 rayos) -->
  <g opacity="0.5">
    <line x1="400" y1="320" x2="400" y2="210" stroke="#EF9F27" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="460" y2="225" stroke="#EF9F27" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="490" y2="260" stroke="#EF9F27" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="510" y2="320" stroke="#EF9F27" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="490" y2="380" stroke="#EF9F27" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="460" y2="415" stroke="#EF9F27" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="400" y2="430" stroke="#EF9F27" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="340" y2="415" stroke="#EF9F27" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="310" y2="380" stroke="#EF9F27" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="290" y2="320" stroke="#EF9F27" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="310" y2="260" stroke="#EF9F27" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="340" y2="225" stroke="#EF9F27" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- Reactor cuántico central -->
  <circle cx="400" cy="320" r="95" fill="url(#quantum-core)" opacity="0.7"/>
  <circle cx="400" cy="320" r="75" fill="#EF9F27" filter="url(#premium-glow)"/>
  <circle cx="400" cy="320" r="58" fill="#E24B4A" opacity="0.95"/>
  <circle cx="400" cy="320" r="42" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="400" cy="320" r="28" fill="#EF9F27" opacity="0.95"/>
  <circle cx="400" cy="320" r="15" fill="#FFFFFF"/>
  
  <!-- Nodos de anclaje (12 puntos) -->
  <circle cx="400" cy="210" r="14" fill="#E24B4A" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="460" cy="225" r="13" fill="#E24B4A" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="490" cy="260" r="12" fill="#EF9F27" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="510" cy="320" r="14" fill="#E24B4A" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="490" cy="380" r="12" fill="#EF9F27" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="460" cy="415" r="13" fill="#E24B4A" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="400" cy="430" r="14" fill="#E24B4A" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="340" cy="415" r="13" fill="#E24B4A" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="310" cy="380" r="12" fill="#EF9F27" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="290" cy="320" r="14" fill="#E24B4A" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="310" cy="260" r="12" fill="#EF9F27" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="340" cy="225" r="13" fill="#E24B4A" stroke="#FFFFFF" stroke-width="3"/>
  
  <!-- Texto NEXUS - Logo principal -->
  <text x="400" y="610" text-anchor="middle" fill="url(#text-chrome)" font-size="140" font-weight="900" letter-spacing="10" font-family="Arial Black, sans-serif">NEXUS</text>
  
  <!-- Texto secundario -->
  <line x1="220" y1="660" x2="580" y2="660" stroke="#EF9F27" stroke-width="4" opacity="0.7"/>
  <text x="400" y="700" text-anchor="middle" fill="#378ADD" font-size="24" font-weight="600" letter-spacing="8" font-family="Arial, sans-serif">INGENIERÍA MECATRÓNICA</text>
  <line x1="260" y1="715" x2="540" y2="715" stroke="#378ADD" stroke-width="2" opacity="0.5"/>
</svg>
