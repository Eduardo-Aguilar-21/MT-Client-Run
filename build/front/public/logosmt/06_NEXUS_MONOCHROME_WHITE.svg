    <line x1="400" y1="320" x2="460" y2="225" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="490" y2="260" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="510" y2="320" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="490" y2="380" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="460" y2="415" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="400" y2="430" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="340" y2="415" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="310" y2="380" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="290" y2="320" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="310" y2="260" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <line x1="400" y1="320" x2="340" y2="225" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- Reactor cuántico central -->
  <circle cx="400" cy="320" r="85" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="400" cy="320" r="65" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="400" cy="320" r="45" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="400" cy="320" r="28" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="400" cy="320" r="15" fill="#FFFFFF"/>
  
  <!-- Nodos de anclaje -->
  <circle cx="400" cy="210" r="14" fill="#FFFFFF"/>
  <circle cx="460" cy="225" r="13" fill="#FFFFFF"/>
  <circle cx="490" cy="260" r="12" fill="#FFFFFF"/>
  <circle cx="510" cy="320" r="14" fill="#FFFFFF"/>
  <circle cx="490" cy="380" r="12" fill="#FFFFFF"/>
  <circle cx="460" cy="415" r="13" fill="#FFFFFF"/>
  <circle cx="400" cy="430" r="14" fill="#FFFFFF"/>
  <circle cx="340" cy="415" r="13" fill="#FFFFFF"/>
  <circle cx="310" cy="380" r="12" fill="#FFFFFF"/>
  <circle cx="290" cy="320" r="14" fill="#FFFFFF"/>
  <circle cx="310" cy="260" r="12" fill="#FFFFFF"/>
  <circle cx="340" cy="225" r="13" fill="#FFFFFF"/>
  
  <!-- Texto NEXUS -->
  <text x="400" y="610" text-anchor="middle" fill="#FFFFFF" font-size="140" font-weight="900" letter-spacing="10" font-family="Arial Black, sans-serif">NEXUS</text>
  
  <!-- Líneas decorativas -->
  <line x1="220" y1="660" x2="580" y2="660" stroke="#FFFFFF" stroke-width="4"/>
  <text x="400" y="700" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="600" letter-spacing="8" font-family="Arial, sans-serif">INGENIERÍA MECATRÓNICA</text>
  <line x1="260" y1="715" x2="540" y2="715" stroke="#FFFFFF" stroke-width="2"/>
</svg>
