  <path d="M 400,210 L 430,250 L 430,390 L 400,430 L 370,390 L 370,250 Z" 
        fill="none" stroke="#FFFFFF" stroke-width="9" opacity="0.7"/>
  
  <!-- Placas nanotecnológicas -->
  <g opacity="0.8">
    <path d="M 380,220 L 400,210 L 420,220 L 420,245 L 400,255 L 380,245 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 445,245 L 475,255 L 470,290 L 440,280 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 475,295 L 490,310 L 485,345 L 470,330 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 485,350 L 490,380 L 470,385 L 465,355 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 475,400 L 490,415 L 470,445 L 455,430 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 445,450 L 475,460 L 465,490 L 435,480 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 380,495 L 400,505 L 420,495 L 420,470 L 400,460 L 380,470 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 355,450 L 325,460 L 335,490 L 365,480 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 325,400 L 310,415 L 330,445 L 345,430 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 315,350 L 310,380 L 330,385 L 335,355 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 325,295 L 310,310 L 315,345 L 330,330 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 355,245 L 325,255 L 330,290 L 360,280 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
  </g>
  
  <!-- Red neuronal energética -->
