<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <title>NEXUS - Versión Monocromática Inversa (Blanco sobre Negro)</title>
  <desc>Optimizado para pantallas oscuras, grabado láser en metal oscuro, dark mode</desc>
  
  <!-- Fondo negro -->
  <rect width="800" height="900" fill="#000000"/>
  
  <!-- Anillos de influencia -->
  <circle cx="400" cy="320" r="377" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.2"/>
  <circle cx="400" cy="320" r="233" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="320" r="144" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.4"/>
  <circle cx="400" cy="320" r="89" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.5"/>
  
  <!-- Hexágonos concéntricos -->
  <path d="M 400,50 L 550,150 L 550,490 L 400,590 L 250,490 L 250,150 Z" 
        fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.3"/>
  <path d="M 400,90 L 520,175 L 520,465 L 400,550 L 280,465 L 280,175 Z" 
        fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.4"/>
  <path d="M 400,130 L 490,200 L 490,440 L 400,510 L 310,440 L 310,200 Z" 
